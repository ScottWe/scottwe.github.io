params:
    description: "This website describes the research and academic work of Scott Wesley."
    author: Scott Wesley
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
