    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Scott Wesley (PhD Student)
          subtitle: "I am a PhD Candidate in the department of Mathematics at Dalhousie University under the supervision of Dr. Neil Julien Ross. My research interests include quantum computing, categorical algebra, computational algebra, and formal methods."
          imageUrl: "picture.jpeg"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Papers
              url: papers/
            - name: Data
              url: data/
            - name: Books
              url: books/
            - name: Courses
              url: courses/
            - name: Tags
              url: tags/
            - name: Archive
              url: archive/
            - name: Blog
              url: https://en.wikipedia.org/wiki/Moritz-Maria_von_Igelfeld_(character)

    socialIcons:
        - name: Email
          url: mailto:scott.wesley@dal.ca
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=user&user=vLuVbrYAAAAJ
        - name: ResearchGate
          url: https://www.researchgate.net/profile/Scott-Wesley
        - name: GitHub
          url: https://github.com/scottwe
        - name: LinkedIn
          url: https://www.linkedin.com/in/scott-wesley-340966419
        - name: stackoverflow
